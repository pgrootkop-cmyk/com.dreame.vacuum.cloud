<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/homey-widget.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    .container { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .map-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: #eee; }
    .map-area canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    .no-map { color: var(--homey-text-color-light); font-size: var(--homey-font-size-small); text-align: center; padding: 20px; }
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; gap: 8px; border-top: var(--homey-line-light); }
    .status-item { display: flex; align-items: center; gap: 4px; font-size: var(--homey-font-size-small); color: var(--homey-text-color); }
    .status-item .val { font-weight: var(--homey-font-weight-medium); }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.cleaning { background: var(--homey-color-green-500, #34c759); }
    .dot.docked { background: var(--homey-color-blue-500, #007aff); }
    .dot.charging { background: var(--homey-color-orange-500, #ff9500); }
    .dot.stopped { background: var(--homey-color-mono-400, #999); }
    .battery-icon { display: inline-block; width: 18px; height: 10px; border: 1.5px solid currentColor; border-radius: 2px; position: relative; }
    .battery-icon::after { content: ''; position: absolute; right: -3px; top: 2px; width: 2px; height: 4px; background: currentColor; border-radius: 0 1px 1px 0; }
    .battery-fill { height: 100%; border-radius: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="map-area" id="mapArea">
      <canvas id="canvas" style="display:none;"></canvas>
      <div class="no-map" id="noMap">Loading...</div>
    </div>
    <div class="status-bar" id="statusBar" style="display:none;">
      <div class="status-item"><span class="dot" id="stateDot"></span><span class="val" id="stateText">-</span></div>
      <div class="status-item">
        <span class="battery-icon"><span class="battery-fill" id="batteryFill"></span></span>
        <span class="val" id="batteryText">-</span>
      </div>
      <div class="status-item"><span class="val" id="progressText"></span></div>
    </div>
  </div>

<script>
// Shared map renderer (keep in sync with settings/index.html)
function renderMapToCanvas(canvas, data, options) {
  var opts = options || {};
  var showRoomNames = opts.showRoomNames !== false;
  var w = data.width, h = data.height;
  var raw = atob(data.pixels);
  var scale = Math.max(1, Math.min(3, Math.floor(800 / Math.max(w, h))));
  canvas.width = w * scale;
  canvas.height = h * scale;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#eee';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var off = document.createElement('canvas');
  off.width = w; off.height = h;
  var offCtx = off.getContext('2d');
  var img = offCtx.createImageData(w, h);
  for (var i = 0; i < raw.length; i++) img.data[i] = raw.charCodeAt(i);
  offCtx.putImageData(img, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, w * scale, h * scale);
  if (data.chargerPos && data.chargerPos.x > 0) {
    ctx.beginPath();
    ctx.arc(data.chargerPos.x * scale, data.chargerPos.y * scale, Math.max(3, scale * 2), 0, Math.PI * 2);
    ctx.fillStyle = '#ff9500'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, scale * 0.5); ctx.stroke();
  }
  if (data.robotPos && data.robotPos.x > 0) {
    ctx.beginPath();
    ctx.arc(data.robotPos.x * scale, data.robotPos.y * scale, Math.max(4, scale * 2.5), 0, Math.PI * 2);
    ctx.fillStyle = '#007aff'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, scale * 0.5); ctx.stroke();
  }
  if (showRoomNames && data.roomLabels && data.roomLabels.length > 0) {
    var fontSize = Math.max(9, Math.min(13, scale * 4));
    ctx.font = '600 ' + fontSize + 'px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var sw = Math.max(2, scale);
    for (var j = 0; j < data.roomLabels.length; j++) {
      var label = data.roomLabels[j];
      var lx = label.x * scale, ly = label.y * scale;
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = sw; ctx.lineJoin = 'round';
      ctx.strokeText(label.name, lx, ly);
      ctx.fillStyle = 'rgba(15,15,15,0.9)';
      ctx.fillText(label.name, lx, ly);
    }
  }
}
</script>
<script>
function onHomeyReady(Homey) {
  var settings = Homey.getSettings();
  var showStatus = settings.showStatus !== false;
  var showRoomNames = settings.showRoomNames !== false;

  if (showStatus) {
    document.getElementById('statusBar').style.display = 'flex';
  }

  Homey.api('GET', '/data').then(function(dev) {
    if (dev) updateStatus(dev);
  }).catch(function() {});

  Homey.api('GET', '/map').then(function(data) {
    if (data && data.width) {
      renderMapToCanvas(document.getElementById('canvas'), data, { showRoomNames: showRoomNames });
      document.getElementById('canvas').style.display = 'block';
      document.getElementById('noMap').style.display = 'none';
    } else {
      document.getElementById('noMap').textContent = 'No map available';
    }
  }).catch(function() {
    document.getElementById('noMap').textContent = 'Could not load map';
  }).finally(function() {
    Homey.ready();
  });
}

function updateStatus(dev) {
  var c = dev.capabilities || {};
  var state = c.vacuumcleaner_state || 'unknown';
  var battery = c.measure_battery;
  var progress = c.dreame_cleaning_progress;

  document.getElementById('stateText').textContent = state.charAt(0).toUpperCase() + state.slice(1);
  document.getElementById('stateDot').className = 'dot ' + state;

  if (battery != null) {
    document.getElementById('batteryText').textContent = battery + '%';
    var fill = document.getElementById('batteryFill');
    fill.style.width = battery + '%';
    fill.style.background = battery > 50 ? '#34c759' : battery > 20 ? '#ff9500' : '#ff3b30';
  }

  if (progress != null && state === 'cleaning') {
    document.getElementById('progressText').textContent = progress + '%';
  }
}
</script>
</body>
</html>
